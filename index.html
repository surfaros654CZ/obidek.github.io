<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <title>Hlasování o obědě</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f5f5f5; margin: 0; padding: 20px; }
    .container { max-width: 900px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
    button { padding: 10px 20px; margin: 5px; cursor: pointer; border: 1px solid #ddd; border-radius: 4px; background: white; }
    button:hover { background: #f0f0f0; }
    input { padding: 10px; margin: 5px 0; width: 100%; max-width: 300px; border: 1px solid #ddd; border-radius: 4px; }
    .hidden { display: none; }
    .card { border: 1px solid #ddd; padding: 15px; margin: 10px 0; border-radius: 4px; cursor: pointer; transition: all 0.2s; }
    .card:hover { border-color: #0066cc; background: #f0f7ff; }
    .card.voted { border: 2px solid #0066cc; background: #f0f7ff; }
    .votes { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
    .vote-count { font-weight: bold; color: #0066cc; }
    .vote-bar { flex: 1; height: 6px; background: #e0e0e0; margin: 0 10px; border-radius: 3px; }
    .vote-fill { height: 100%; background: #0066cc; }
    h1 { margin-top: 0; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 10px; margin: 20px 0; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🍽️ Hlasování o obědě</h1>

    <!-- Přihlášení -->
    <div id="loginArea">
      <h2>Přihlášení</h2>
      <button onclick="showCreate()">Založit session</button>
      <button onclick="showJoin()">Připojit se</button>

      <div id="createArea" class="hidden" style="margin-top: 20px; border: 1px solid #ddd; padding: 15px; border-radius: 4px;">
        <h3>Nová session</h3>
        <input type="text" id="newSessionCode" placeholder="Kód (např. FORD1)" maxlength="10" />
        <input type="text" id="newUserName" placeholder="Tvé jméno" />
        <button onclick="doCreate()">Vytvořit</button>
        <button onclick="hideCreate()">Zrušit</button>
        <div id="createError" style="color: red; margin-top: 10px;"></div>
      </div>

      <div id="joinArea" class="hidden" style="margin-top: 20px; border: 1px solid #ddd; padding: 15px; border-radius: 4px;">
        <h3>Připojit se</h3>
        <input type="text" id="joinCode" placeholder="Kód session" />
        <input type="text" id="joinName" placeholder="Tvé jméno" />
        <button onclick="doJoin()">Připojit</button>
        <button onclick="hideJoin()">Zrušit</button>
        <div id="joinError" style="color: red; margin-top: 10px;"></div>
      </div>
    </div>

    <!-- Aplikace -->
    <div id="appArea" class="hidden">
      <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #ddd; padding-bottom: 15px; margin-bottom: 20px;">
        <div>
          <h2 id="sessionCode" style="color: #0066cc; margin: 0;">FORD1</h2>
          <p id="userName" style="margin: 5px 0 0 0; color: #666;">Přihlášen jako: Jan</p>
        </div>
        <button onclick="logout()">Odhlásit se</button>
      </div>

      <p id="dateInfo" style="text-align: center; color: #666;"></p>

      <div class="grid" id="restaurantGrid"></div>

      <div style="margin-top: 30px; padding: 15px; background: #f9f9f9; border-radius: 4px;">
        <h3>Účastníci (<span id="participantCount">0</span>)</h3>
        <div id="participantList" style="display: flex; flex-wrap: wrap; gap: 8px;"></div>
      </div>

      <div id="resultsArea" class="hidden" style="margin-top: 30px; padding: 20px; background: #e8f4f8; border-radius: 4px; text-align: center;">
        <h2 id="winnerName" style="color: #0066cc;">-</h2>
        <p id="winnerVotes">-</p>
      </div>
    </div>
  </div>

  <script>
    const MENUS = [
      { id: 1, name: "Jídlovice Dejvice", cuisine: "Česká", menu: "Svíčková, Kuřecí řízek, Burger" },
      { id: 2, name: "Meat Market Bistro", cuisine: "Steakhouse", menu: "Steak, Kuřecí prsíčko, Zelenina" },
      { id: 3, name: "U Fleků", cuisine: "Česká", menu: "Goulash, Řízek, Bramborák" },
      { id: 4, name: "Lotos", cuisine: "Vietnamská", menu: "Pho hovězí, Spring rolls, Pad Thai" },
      { id: 5, name: "Italská", cuisine: "Italská", menu: "Pasta Carbonara, Pizza, Risotto" }
    ];

    let sessions = {};
    let currentSession = null;
    let currentUser = null;

    // Načti z localStorage
    function loadSessions() {
      try {
        const stored = localStorage.getItem('lunch_sessions');
        if (stored) sessions = JSON.parse(stored);
      } catch (e) {
        console.log('Chyba při čtení localStorage');
      }
    }

    // Ulož do localStorage
    function saveSessions() {
      try {
        localStorage.setItem('lunch_sessions', JSON.stringify(sessions));
      } catch (e) {
        console.log('Chyba při zápisu localStorage');
      }
    }

    // UI
    function showCreate() {
      document.getElementById('createArea').classList.remove('hidden');
      document.getElementById('joinArea').classList.add('hidden');
    }

    function hideCreate() {
      document.getElementById('createArea').classList.add('hidden');
      document.getElementById('createError').innerHTML = '';
    }

    function showJoin() {
      document.getElementById('joinArea').classList.remove('hidden');
      document.getElementById('createArea').classList.add('hidden');
    }

    function hideJoin() {
      document.getElementById('joinArea').classList.add('hidden');
      document.getElementById('joinError').innerHTML = '';
    }

    function doCreate() {
      const code = document.getElementById('newSessionCode').value.toUpperCase().trim();
      const name = document.getElementById('newUserName').value.trim();
      const err = document.getElementById('createError');

      if (!code || !name) {
        err.innerHTML = '❌ Vyplň všechna pole';
        return;
      }

      if (sessions[code]) {
        err.innerHTML = '❌ Session už existuje';
        return;
      }

      // Vytvoř
      sessions[code] = {
        participants: [name],
        votes: {}
      };
      MENUS.forEach(m => sessions[code].votes[m.id] = []);
      sessions[code].votes[MENUS[0].id] = [name]; // První vůtě si vezme první hlас

      saveSessions();
      currentSession = code;
      currentUser = name;
      showApp();
    }

    function doJoin() {
      const code = document.getElementById('joinCode').value.toUpperCase().trim();
      const name = document.getElementById('joinName').value.trim();
      const err = document.getElementById('joinError');

      if (!code || !name) {
        err.innerHTML = '❌ Vyplň všechna pole';
        return;
      }

      if (!sessions[code]) {
        err.innerHTML = '❌ Session nenalezena';
        return;
      }

      if (sessions[code].participants.includes(name)) {
        err.innerHTML = '❌ Jméno už existuje';
        return;
      }

      sessions[code].participants.push(name);
      saveSessions();
      currentSession = code;
      currentUser = name;
      showApp();
    }

    function showApp() {
      document.getElementById('loginArea').classList.add('hidden');
      document.getElementById('appArea').classList.remove('hidden');
      render();
    }

    function render() {
      if (!sessions[currentSession]) return;

      const session = sessions[currentSession];

      // Info
      document.getElementById('sessionCode').innerHTML = currentSession;
      document.getElementById('userName').innerHTML = `Přihlášen jako: ${currentUser}`;
      document.getElementById('dateInfo').innerHTML = `Dnes je ${new Date().toLocaleDateString('cs-CZ', { weekday: 'long' })}`;
      document.getElementById('participantCount').innerHTML = session.participants.length;

      // Účastníci
      document.getElementById('participantList').innerHTML = session.participants
        .map(p => `<div style="background: #0066cc; color: white; padding: 5px 10px; border-radius: 4px; font-size: 12px;">${p}</div>`)
        .join('');

      // Restaurace
      const grid = document.getElementById('restaurantGrid');
      grid.innerHTML = MENUS.map(m => {
        const votes = (session.votes[m.id] || []).length;
        const total = session.participants.length || 1;
        const pct = Math.round((votes / total) * 100);
        const isVoted = (session.votes[m.id] || []).includes(currentUser);

        return `
          <div class="card ${isVoted ? 'voted' : ''}" onclick="vote(${m.id})">
            <h3 style="margin: 0 0 5px 0;">${m.name}</h3>
            <p style="margin: 0 0 10px 0; color: #999; font-size: 12px;">${m.cuisine}</p>
            <p style="background: #f9f9f9; padding: 8px; border-radius: 4px; margin: 0 0 10px 0;">${m.menu}</p>
            <div class="votes">
              <span class="vote-count">${votes} hlasů</span>
              <div class="vote-bar"><div class="vote-fill" style="width: ${pct}%"></div></div>
            </div>
          </div>
        `;
      }).join('');

      // Výsledky
      const maxVotes = Math.max(...MENUS.map(m => (session.votes[m.id] || []).length));
      if (maxVotes > 0) {
        const winner = MENUS.find(m => (session.votes[m.id] || []).length === maxVotes);
        document.getElementById('resultsArea').classList.remove('hidden');
        document.getElementById('winnerName').innerHTML = `🎉 ${winner.name}`;
        document.getElementById('winnerVotes').innerHTML = `${maxVotes} ${maxVotes === 1 ? 'hlas' : 'hlasů'}`;
      } else {
        document.getElementById('resultsArea').classList.add('hidden');
      }
    }

    function vote(id) {
      const session = sessions[currentSession];
      
      // Odstraň starý hlas
      MENUS.forEach(m => {
        session.votes[m.id] = (session.votes[m.id] || []).filter(u => u !== currentUser);
      });

      // Přidej nový
      if (!session.votes[id]) session.votes[id] = [];
      session.votes[id].push(currentUser);

      saveSessions();
      render();
    }

    function logout() {
      const session = sessions[currentSession];
      session.participants = session.participants.filter(p => p !== currentUser);

      MENUS.forEach(m => {
        session.votes[m.id] = (session.votes[m.id] || []).filter(u => u !== currentUser);
      });

      if (session.participants.length === 0) {
        delete sessions[currentSession];
      }

      saveSessions();
      currentSession = null;
      currentUser = null;
      document.getElementById('appArea').classList.add('hidden');
      document.getElementById('loginArea').classList.remove('hidden');
      hideCreate();
      hideJoin();
    }

    // Start
    loadSessions();
    document.getElementById('dateInfo').innerHTML = `Dnes je ${new Date().toLocaleDateString('cs-CZ', { weekday: 'long' })}`;
  </script>
</body>
</html>
